name: Apply Supabase env diagnostics patch

on:
  push:
    paths:
      - "patches/supabase-env-diagnostics.patch"
      - ".github/workflows/apply-supabase-env-diagnostics.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply patch
        run: |
          git apply patches/supabase-env-diagnostics.patch
          rm -f patches/supabase-env-diagnostics.patch .github/workflows/apply-supabase-env-diagnostics.yml
          rmdir patches 2>/dev/null || true
      - name: Commit updated project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add Supabase env diagnostics" || exit 0
          git push
