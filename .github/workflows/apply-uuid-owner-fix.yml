name: Apply UUID owner fix patch

on:
  push:
    paths:
      - "patches/uuid-owner-fix.patch"
      - ".github/workflows/apply-uuid-owner-fix.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply patch
        run: |
          git apply patches/uuid-owner-fix.patch
          rm -f patches/uuid-owner-fix.patch .github/workflows/apply-uuid-owner-fix.yml
          rmdir patches 2>/dev/null || true
      - name: Commit updated project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Use current user UUID in inventory forms" || exit 0
          git push
