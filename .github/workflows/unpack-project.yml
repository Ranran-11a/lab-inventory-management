name: Unpack project archive

on:
  push:
    paths:
      - "project-archive/**"
      - ".github/workflows/unpack-project.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reconstruct project
        run: |
          cat project-archive/part-aa.b64 project-archive/part-ab.b64 project-archive/part-ac.b64 project-archive/part-ad.b64 > project-archive/archive.b64
          base64 -d project-archive/archive.b64 > project.tar.gz
          tar -xzf project.tar.gz
          rm -rf project-archive project.tar.gz .github/workflows/unpack-project.yml
      - name: Commit unpacked project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add deployable project files" || exit 0
          git push
